kind = "web"
previewPath = "/"
title = "IT Class Tracker"
version = "1.0.0"
id = "artifacts/it-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18832
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/it-tracker run dev"

[services.env]
PORT = "18832"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/it-tracker", "run", "build"]
publicDir = "artifacts/it-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
